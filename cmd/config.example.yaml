# TalkToThem Configuration
# https://github.com/julienrbrt/talktothem

signal:
  phone_number: "+1234567890"
  api_url: "http://localhost:8080"  # signal-cli-rest-api endpoint

agent:
  api_key: "sk-..."  # required
  model: "gpt-4o"
  base_url: ""  # optional, for OpenAI-compatible APIs

contact:
  data_path: ""  # defaults to ~/.config/talktothem/contacts (or /app/data/contacts in Docker)
