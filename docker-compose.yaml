services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    environment:
      - MODE=json-rpc
    ports:
      - "8080:8080"
    volumes:
      - ./data/signal:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  talktothem:
    build: .
    container_name: talktothem
    depends_on:
      signal-api:
        condition: service_healthy
    environment:
      - TALKTOTHEM_SIGNAL_API_URL=http://signal-api:8080
      - TALKTOTHEM_CONTACT_DATA_PATH=/app/data/contacts
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data/contacts:/app/data/contacts
    command: ["run"]
    restart: unless-stopped
