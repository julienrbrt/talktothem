{{define "messenger-badge"}}
<span class="messenger-badge{{if eq . "signal"}} messenger-signal{{else if eq . "whatsapp"}} messenger-whatsapp{{else}} messenger-unknown{{end}}">
    {{if eq . "signal"}}
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><use href="/static/icons.svg#icon-signal"/></svg>
    <span>Signal</span>
    {{else if eq . "whatsapp"}}
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><use href="/static/icons.svg#icon-whatsapp"/></svg>
    <span>WhatsApp</span>
    {{else}}
    <span>.</span>
    {{end}}
</span>
{{end}}
