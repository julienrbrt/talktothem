{{define "settings-content"}}
<div class="flex-1 overflow-y-auto p-10 bg-[#fafafa]">
    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">
                Settings<span class="text-purple-600">.</span>
            </h2>
            <p class="text-gray-500 font-medium mt-1">
                Configure your systems and connections.
            </p>
        </header>

        <div class="space-y-8">
            <!-- Signal Connection -->
            <section class="bento-card p-8 bg-white">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h3
                            class="text-xl font-black text-gray-900 tracking-tight"
                        >
                            Signal Protocol
                        </h3>
                        <p class="text-sm text-gray-400 font-medium">
                            Secondary device linking via Signal-CLI.
                        </p>
                    </div>
                    <div id="signal-status" class="flex items-center gap-3">
                        <div
                            id="signal-dot"
                            class="w-2.5 h-2.5 rounded-full bg-gray-300"
                        ></div>
                        <span
                            id="signal-text"
                            class="text-[10px] font-black text-gray-400 uppercase tracking-widest"
                            >Idle</span
                        >
                    </div>
                </div>

                <div
                    class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100"
                >
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-gray-200 shadow-sm"
                        >
                            <svg
                                class="w-6 h-6 text-[#3a76f0]"
                                fill="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    d="M12 2C6.477 2 2 6.477 2 12c0 1.891.526 3.658 1.438 5.161L2.121 21.879l4.718-1.317C8.342 21.474 10.109 22 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.636 0-3.167-.442-4.484-1.213l-.321-.188-2.828.789.789-2.828-.188-.321C4.442 15.167 4 13.636 4 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"
                                ></path>
                            </svg>
                        </div>
                        <div>
                            <p
                                id="signal-number"
                                class="text-sm font-bold text-gray-900 leading-none"
                            >
                                Not Linked
                            </p>
                            <p
                                class="text-[10px] font-black text-gray-400 uppercase tracking-tighter mt-1"
                            >
                                Status:
                                <span id="signal-status-label">Offline</span>
                            </p>
                        </div>
                    </div>
                    <button
                        id="signal-relink-btn"
                        onclick="showRelinkQR()"
                        class="hidden bg-black text-white text-[11px] font-black uppercase tracking-widest py-2 px-6 rounded-xl hover:bg-gray-800 transition-all shadow-lg shadow-gray-200"
                    >
                        Link Device
                    </button>
                </div>

                <!-- QR Code container -->
                <div
                    id="relink-container"
                    class="hidden mt-8 pt-8 border-t border-gray-50"
                >
                    <div
                        class="text-center bg-gray-50 p-8 rounded-[32px] border border-dashed border-gray-200"
                    >
                        <p
                            class="text-xs font-bold text-gray-500 mb-6 uppercase tracking-widest"
                        >
                            Scan to synchronize
                        </p>
                        <div id="relink-qr" class="flex flex-col items-center">
                            <div
                                class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"
                            ></div>
                        </div>
                    </div>
                </div>

                <!-- Sync Contacts -->
                <div class="mt-8 pt-8 border-t border-gray-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-bold text-gray-900">
                                Contacts
                            </p>
                        </div>
                        <button
                            onclick="syncContacts()"
                            class="bg-black text-white text-[11px] font-black uppercase tracking-widest py-2 px-6 rounded-xl hover:bg-gray-800 transition-all shadow-lg shadow-gray-200"
                        >
                            Re-sync
                        </button>
                    </div>
                </div>
            </section>

            <!-- API Configuration -->
            <section class="bento-card p-8 bg-white">
                <div class="mb-8">
                    <h3 class="text-xl font-black text-gray-900 tracking-tight">
                        AI Settings
                    </h3>
                    <p class="text-sm text-gray-400 font-medium">
                        AI response settings.
                    </p>
                </div>

                <form
                    id="api-config-form"
                    onsubmit="saveApiConfig(event)"
                    class="space-y-6"
                >
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label
                                class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1"
                                >Access Token</label
                            >
                            <input
                                type="password"
                                id="config-apiKey"
                                class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:bg-white transition-all"
                                placeholder="sk-..."
                            />
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1"
                                >Model ID</label
                            >
                            <input
                                type="text"
                                id="config-model"
                                class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:bg-white transition-all"
                                placeholder="gpt-4o"
                            />
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1"
                            >Endpoint URL</label
                        >
                        <input
                            type="url"
                            id="config-baseUrl"
                            class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:bg-white transition-all"
                            placeholder="https://api.openai.com/v1"
                        />
                    </div>

                    <div
                        class="flex items-center justify-between p-4 bg-purple-50/50 rounded-2xl border border-purple-100/50"
                    >
                        <div class="flex items-center gap-4">
                            <div
                                class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-purple-100"
                            >
                                <svg
                                    class="w-5 h-5 text-purple-600"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2.5"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                                    ></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-900">
                                    Simulated Latency
                                </p>
                                <p
                                    class="text-[10px] font-black text-purple-400 uppercase tracking-tighter"
                                >
                                    Human typing simulation
                                </p>
                            </div>
                        </div>
                        <div
                            class="relative inline-block w-12 h-6 transition duration-200 ease-in-out rounded-full shadow-inner"
                        >
                            <input
                                type="checkbox"
                                id="config-disableDelay"
                                class="sr-only peer"
                            />
                            <label
                                for="config-disableDelay"
                                class="absolute top-0 left-0 w-12 h-6 bg-gray-200 rounded-full cursor-pointer peer-checked:bg-purple-600 transition-colors after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-6"
                            ></label>
                        </div>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button
                            type="submit"
                            class="bg-black text-white text-[11px] font-black uppercase tracking-[0.2em] py-4 px-10 rounded-2xl hover:bg-gray-800 transition-all shadow-xl shadow-gray-200"
                        >
                            Apply Changes
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</div>

<script>
    (function () {
        window.loadSignalStatus = async function () {
            const dot = document.getElementById("signal-dot");
            const text = document.getElementById("signal-text");
            const label = document.getElementById("signal-status-label");
            const number = document.getElementById("signal-number");
            const relinkBtn = document.getElementById("signal-relink-btn");

            try {
                const response = await fetch("/api/status");
                const data = await response.json();

                if (
                    data.connectionStatus === "connected" &&
                    data.messengers.signal?.connected
                ) {
                    dot.className =
                        "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]";
                    text.textContent = "Active";
                    text.className =
                        "text-[10px] font-black text-green-500 uppercase tracking-widest";
                    label.textContent = "Connected";
                    number.textContent =
                        data.messengers.signal?.phone || "Linked";
                    relinkBtn.textContent = "Relink";
                    relinkBtn.classList.remove("hidden");
                } else {
                    dot.className = "w-2.5 h-2.5 rounded-full bg-gray-300";
                    text.textContent = "Idle";
                    label.textContent = "Offline";
                    number.textContent = "Not Linked";
                    relinkBtn.textContent = "Link Device";
                    relinkBtn.classList.remove("hidden");
                }
            } catch (e) {
                console.error(e);
            }
        };

        window.loadApiConfig = async function () {
            try {
                const response = await fetch("/api/config");
                if (response.ok) {
                    const config = await response.json();
                    document.getElementById("config-apiKey").value =
                        config.apiKey || "";
                    document.getElementById("config-model").value =
                        config.model || "";
                    document.getElementById("config-baseUrl").value =
                        config.baseUrl || "";
                    document.getElementById("config-disableDelay").checked =
                        !!config.disableDelay;
                }
            } catch (e) {
                console.error(e);
            }
        };

        window.saveApiConfig = async function (e) {
            e.preventDefault();
            const data = {
                apiKey: document.getElementById("config-apiKey").value,
                model: document.getElementById("config-model").value,
                baseUrl: document.getElementById("config-baseUrl").value,
                disableDelay: document.getElementById("config-disableDelay")
                    .checked,
            };

            try {
                const response = await fetch("/api/config", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                if (response.ok) showToast("Configuration synchronized");
            } catch (e) {
                alert("Sync failed");
            }
        };

        window.syncContacts = async function () {
            try {
                showToast("Syncing contacts...");
                const response = await fetch(
                    "/api/messenger/signal/contacts/import",
                    { method: "POST" },
                );

                if (response.ok) {
                    showToast("Contacts synchronized");
                    const contactListResponse = await fetch("/api/contacts");
                    if (contactListResponse.ok) {
                        document.getElementById("contact-list").innerHTML =
                            await contactListResponse.text();
                    }
                } else {
                    const text = await response.text();
                    showToast("Sync failed: " + text);
                }
            } catch (e) {
                console.error(e);
                showToast("Sync failed");
            }
        };

        window.showRelinkQR = async function () {
            const container = document.getElementById("relink-container");
            const qrDiv = document.getElementById("relink-qr");
            container.classList.remove("hidden");
            qrDiv.innerHTML =
                '<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"></div>';

            try {
                await fetch("/api/messenger/signal/unlink", { method: "POST" });
                const response = await fetch(
                    "/api/messenger/signal/link/start",
                );
                const data = await response.json();
                qrDiv.innerHTML = `
                <img src="data:image/png;base64,${data.qrCode}" class="w-64 h-64 border-4 border-white rounded-[32px] shadow-2xl">
                <p class="text-[10px] font-black text-purple-600 uppercase mt-6 tracking-widest animate-pulse">Scanning...</p>
            `;
                startRelinkPolling();
            } catch (e) {
                qrDiv.innerHTML =
                    '<p class="text-red-500 font-bold">Generation Failed</p>';
            }
        };

        function startRelinkPolling() {
            const container = document.getElementById("relink-container");
            const qrDiv = document.getElementById("relink-qr");
            let attempts = 0;
            const poll = async () => {
                if (attempts >= 120) return;
                try {
                    const response = await fetch(
                        "/api/messenger/signal/link/status",
                    );
                    const data = await response.json();
                    if (data.linked) {
                        qrDiv.innerHTML =
                            '<div class="text-purple-600 font-black uppercase text-sm tracking-widest">Synchronization Complete</div>';
                        setTimeout(() => {
                            container.classList.add("hidden");
                            window.loadSignalStatus();
                        }, 2000);
                        return;
                    }
                } catch (e) {}
                attempts++;
                setTimeout(poll, 1000);
            };
            poll();
        }

        window.loadSignalStatus();
        window.loadApiConfig();
    })();
</script>
{{end}}
